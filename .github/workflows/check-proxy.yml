name: Daily Proxy Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-proxies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check proxies
        shell: bash
        env:
          PROXY_IPS: ${{ secrets.PROXY_IPS }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          set -euo pipefail

          # ==================== 第一步：解析输入，建立候选 ↔ 原始行映射 ====================
          # 将逗号或换行分隔的输入规范化，写入临时文件
          printf '%s\n' "$PROXY_IPS" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' > /tmp/input.txt

          TOTAL=$(wc -l < /tmp/input.txt | tr -d ' ')
          echo "=== 共 $TOTAL 行待处理 ==="

          # 建立候选 → 原始行的精确映射（用 bash 关联数组，避免 grep 子串误匹配）
          declare -A ORIGINAL_LINE
          CANDIDATES=()

          while IFS= read -r line; do
            # 提取 IP:PORT（# 之前的部分），去除首尾空白
            candidate="${line%%#*}"
            # bash 原生去首尾空白
            candidate="${candidate#"${candidate%%[![:space:]]*}"}"
            candidate="${candidate%"${candidate##*[![:space:]]}"}"

            # 去掉可能的 socks5:// http:// 等协议前缀
            candidate="${candidate#*://}"

            # 跳过空候选（纯注释行等）
            if [[ -z "$candidate" ]]; then
              echo "  [跳过] 无效行: $line"
              continue
            fi

            # 简单校验：至少包含数字或方括号（IP/域名特征），且含冒号（端口分隔符）
            if [[ "$candidate" =~ [0-9] ]] || [[ "$candidate" == \[* ]]; then
              CANDIDATES+=("$candidate")
              ORIGINAL_LINE["$candidate"]="$line"
              echo "  [识别] $candidate"
            else
              echo "  [跳过] 无法识别为有效候选: $line"
            fi
          done < /tmp/input.txt

          CANDIDATE_COUNT=${#CANDIDATES[@]}
          echo "=== 有效候选: $CANDIDATE_COUNT 个 ==="

          if [[ "$CANDIDATE_COUNT" -eq 0 ]]; then
            echo "没有有效候选，退出"
            exit 0
          fi

          # ==================== 第二步：构建 JSON 并调用 Worker API ====================
          # 用 jq 构建 JSON 数组（每个元素是去重后的 IP:PORT）
          IPS_JSON=$(printf '%s\n' "${CANDIDATES[@]}" | jq -R -s 'split("\n") | map(select(. != "")) | unique')

          echo "=== 调用 Worker API: ${WORKER_URL}/check ==="
          RESPONSE=$(curl -s --max-time 120 -X POST "${WORKER_URL}/check" \
            -H "Content-Type: application/json" \
            -d "{\"proxyips\": $IPS_JSON}")

          # ==================== 第三步：提取成功候选，回写原始行 ====================
          # 用 jq 提取所有 success=true 的 candidate
          SUCCESS_LIST=$(echo "$RESPONSE" | jq -r '
            if type == "array" then
              .[] | select(.success == true) | .candidate
            else
              select(.success == true) | .candidate
            end
          ')

          # 通过关联数组精确查找原始行，写入 proxies.txt
          > proxies.txt
          SUCCESS_COUNT=0
          while IFS= read -r candidate; do
            [[ -z "$candidate" ]] && continue
            original="${ORIGINAL_LINE[$candidate]:-}"
            if [[ -n "$original" ]]; then
              echo "$original" >> proxies.txt
              ((SUCCESS_COUNT++))
            fi
          done <<< "$SUCCESS_LIST"

          FAIL_COUNT=$((TOTAL - SUCCESS_COUNT))
          if [[ "$SUCCESS_COUNT" -gt 0 ]]; then
            SUCCESS_RATE=$(awk "BEGIN {printf \"%.1f\", ($SUCCESS_COUNT/$TOTAL)*100}")
          else
            SUCCESS_RATE="0.0"
          fi

          TIMESTAMP=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          # ==================== 第四步：生成 report.md（详细日报） ====================
          cat > report.md << 'REPORT_HEADER'
          # 代理检测日报

          REPORT_HEADER

          echo "**检测时间**：${TIMESTAMP} (北京时间)" >> report.md
          echo "" >> report.md
          echo "## 概况" >> report.md
          echo "" >> report.md
          echo "| 项目 | 数值 |" >> report.md
          echo "|------|------|" >> report.md
          echo "| 检测总数 | ${TOTAL} |" >> report.md
          echo "| 成功数量 | ${SUCCESS_COUNT} |" >> report.md
          echo "| 失败数量 | ${FAIL_COUNT} |" >> report.md
          echo "| 成功率 | ${SUCCESS_RATE}% |" >> report.md
          echo "" >> report.md
          echo "---" >> report.md
          echo "" >> report.md

          # 成功代理详情
          echo "## 成功代理" >> report.md
          echo "" >> report.md
          if [[ "$SUCCESS_COUNT" -gt 0 ]]; then
            echo "| 代理地址 | 端口 | 协议栈 | IPv4 | IPv6 | 响应时间 |" >> report.md
            echo "|----------|------|--------|------|------|----------|" >> report.md
            echo "$RESPONSE" | jq -r '
              (if type == "array" then .[] else . end | select(.success == true)) as $r |
              "| \($r.proxyIP) | \($r.portRemote) | \($r.inferred_stack) | \($r.supports_ipv4) | \($r.supports_ipv6) | \($r.responseTime)ms |"
            ' >> report.md
          else
            echo "无" >> report.md
          fi

          echo "" >> report.md
          echo "---" >> report.md
          echo "" >> report.md

          # 可用代理列表
          if [[ "$SUCCESS_COUNT" -gt 0 ]]; then
            echo "## 可用代理列表" >> report.md
            echo "" >> report.md
            echo '```' >> report.md
            cat proxies.txt >> report.md
            echo '```' >> report.md
          fi

          echo "" >> report.md
          echo "---" >> report.md
          echo "" >> report.md

          # 失败代理详情
          echo "## 失败代理" >> report.md
          echo "" >> report.md
          if [[ "$FAIL_COUNT" -gt 0 ]]; then
            echo "| 代理地址 | 失败原因 |" >> report.md
            echo "|----------|----------|" >> report.md
            echo "$RESPONSE" | jq -r '
              (if type == "array" then .[] else . end | select(.success != true)) as $r |
              "| \($r.candidate) | \($r.error // "未知错误") |"
            ' >> report.md
          else
            echo "无" >> report.md
          fi

          echo "" >> report.md
          echo "> 本报告由 GitHub Actions 自动生成，每日 ${TIMESTAMP%% *} 更新。" >> report.md

          # ==================== 结果摘要 ====================
          echo ""
          echo "========================================"
          echo "  检测完成：${TIMESTAMP}"
          echo "  总数: ${TOTAL}  |  成功: ${SUCCESS_COUNT}  |  失败: ${FAIL_COUNT}  |  成功率: ${SUCCESS_RATE}%"
          echo "========================================"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proxies.txt report.md
          git diff --staged --quiet || git commit -m "Daily proxy check update [skip ci]"
          git push
