name: Daily Proxy Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      concurrency:
        description: '并发数（每批次检测的IP数量，默认1 = 单线程）'
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  check-proxies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check proxies
        shell: bash
        env:
          PROXY_IPS: ${{ secrets.PROXY_IPS }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          set -uo pipefail

          # ==================== 解析并发数 ====================
          # 优先级：workflow_dispatch 手动输入 > vars 变量 > secrets 变量 > 默认值 1
          CONCURRENCY=1
          RAW=""

          # 1) workflow_dispatch 手动输入（非零才使用）
          MANUAL_VAL="${{ github.event.inputs.concurrency || '0' }}"
          if [[ "$MANUAL_VAL" =~ ^[0-9]+$ ]] && [[ "$MANUAL_VAL" -gt 0 ]]; then
            RAW="$MANUAL_VAL"
            echo "=== 并发数来源: workflow_dispatch 输入 ==="
          fi

          # 2) Repository Variables（Settings > Variables）
          if [[ -z "$RAW" ]]; then
            VAR_VAL="${{ vars.CONCURRENCY || '' }}"
            if [[ -n "$VAR_VAL" ]] && [[ "$VAR_VAL" =~ ^[0-9]+$ ]] && [[ "$VAR_VAL" -ge 1 ]]; then
              RAW="$VAR_VAL"
              echo "=== 并发数来源: Repository Variables ==="
            fi
          fi

          # 3) Repository Secrets（Settings > Secrets）
          if [[ -z "$RAW" ]]; then
            SECRET_VAL="${{ secrets.CONCURRENCY || '' }}"
            if [[ -n "$SECRET_VAL" ]] && [[ "$SECRET_VAL" =~ ^[0-9]+$ ]] && [[ "$SECRET_VAL" -ge 1 ]]; then
              RAW="$SECRET_VAL"
              echo "=== 并发数来源: Repository Secrets ==="
            fi
          fi

          if [[ -n "$RAW" ]]; then
            CONCURRENCY="$RAW"
          else
            echo "=== 并发数来源: 默认值 ==="
          fi
          echo "=== 并发数: $CONCURRENCY（每批次 $CONCURRENCY 个IP）==="

          # ==================== 第一步：解析输入 ====================
          printf '%s\n' "$PROXY_IPS" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' > /tmp/input.txt

          TOTAL=$(wc -l < /tmp/input.txt | tr -d ' ')
          echo "=== 共 $TOTAL 行待处理 ==="

          declare -A ORIGINAL_LINE
          CANDIDATES=()

          while IFS= read -r line; do
            candidate="${line%%#*}"
            candidate="${candidate#"${candidate%%[![:space:]]*}"}"
            candidate="${candidate%"${candidate##*[![:space:]]}"}"
            candidate="${candidate#*://}"

            if [[ -z "$candidate" ]]; then
              continue
            fi

            if [[ "$candidate" == \[* ]]; then
              if [[ "$candidate" =~ ^\[[0-9a-fA-F:]+\]:[0-9]+$ ]]; then
                CANDIDATES+=("$candidate")
                ORIGINAL_LINE["$candidate"]="$line"
                echo "  [识别] $candidate"
              fi
            elif [[ "$candidate" =~ ^[a-zA-Z0-9._-]+:[0-9]+$ ]]; then
              CANDIDATES+=("$candidate")
              ORIGINAL_LINE["$candidate"]="$line"
              echo "  [识别] $candidate"
            else
              echo "  [跳过] 无法识别: $line"
            fi
          done < /tmp/input.txt

          CANDIDATE_COUNT=${#CANDIDATES[@]}
          echo "=== 有效候选: $CANDIDATE_COUNT 个 ==="

          if [[ "$CANDIDATE_COUNT" -eq 0 ]]; then
            echo "没有有效候选，退出"
            > proxies.txt
            echo "# 无有效候选" > report.md
            exit 0
          fi

          # ==================== 第二步：分批调用 Worker API ====================
          rm -f /tmp/batch_*.json
          BATCH_SIZE=$CONCURRENCY
          BATCH_NUM=0
          IDX=0
          BATCH_TOTAL=$(((CANDIDATE_COUNT + BATCH_SIZE - 1) / BATCH_SIZE))

          while [[ $IDX -lt $CANDIDATE_COUNT ]]; do
            BATCH=()
            END=$((IDX + BATCH_SIZE))
            if [[ $END -gt $CANDIDATE_COUNT ]]; then
              END=$CANDIDATE_COUNT
            fi
            for J in $(seq $IDX $((END - 1))); do
              BATCH+=("${CANDIDATES[$J]}")
            done

            BATCH_NUM=$((BATCH_NUM + 1))
            echo "--- 批次 $BATCH_NUM/$BATCH_TOTAL: ${#BATCH[@]} 个候选 ---"

            BATCH_JSON=$(printf '%s\n' "${BATCH[@]}" | jq -R -s 'split("\n") | map(select(. != "")) | unique')

            RESPONSE=$(curl -s --max-time 120 -X POST "${WORKER_URL}/check" \
              -H "Content-Type: application/json" \
              -d "{\"proxyips\": $BATCH_JSON}")

            BATCH_FILE="/tmp/batch_${BATCH_NUM}.json"

            if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
              echo "  !!! 批次返回非 JSON: ${RESPONSE:0:200}"
              RESULTS="[]"
              for c in "${BATCH[@]}"; do
                RESULTS=$(echo "$RESULTS" | jq --arg cand "$c" '. + [{candidate: $cand, success: false, probe_results: {}}]')
              done
              echo "$RESULTS" > "$BATCH_FILE"
            else
              echo "$RESPONSE" | jq -c 'if type == "array" then . else [.] end' > "$BATCH_FILE"
            fi

            success_in_batch=$(jq '[.[] | select(.success == true)] | length' "$BATCH_FILE" 2>/dev/null)
            echo "  成功: ${success_in_batch:-0} / ${#BATCH[@]}"

            IDX=$END
          done

          # 合并所有批次结果为一个 JSON 数组
          jq -s 'add // []' /tmp/batch_*.json > /tmp/response.json 2>/dev/null || echo "[]" > /tmp/response.json

          # ==================== 第三步：提取成功候选 ====================
          SUCCESS_LIST=$(jq -r '.[] | select(.success == true) | .candidate' /tmp/response.json)

          > proxies.txt
          SUCCESS_COUNT=0
          while IFS= read -r candidate; do
            [[ -z "$candidate" ]] && continue
            original="${ORIGINAL_LINE[$candidate]:-}"
            if [[ -n "$original" ]]; then
              echo "$original" >> proxies.txt
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
            fi
          done <<< "$SUCCESS_LIST"

          FAIL_COUNT=$((TOTAL - SUCCESS_COUNT))
          if [[ "$SUCCESS_COUNT" -gt 0 ]]; then
            SUCCESS_RATE=$(awk "BEGIN {printf \"%.1f\", ($SUCCESS_COUNT/$TOTAL)*100}")
          else
            SUCCESS_RATE="0.0"
          fi

          TIMESTAMP=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          # ==================== 第四步：生成 report.md ====================
          {
            echo "# 代理检测日报"
            echo ""
            echo "**检测时间**：${TIMESTAMP} (北京时间)"
            echo "**并发数**：${CONCURRENCY}"
            echo ""
            echo "## 概况"
            echo ""
            echo "| 项目 | 数值 |"
            echo "|------|------|"
            echo "| 检测总数 | ${TOTAL} |"
            echo "| 成功数量 | ${SUCCESS_COUNT} |"
            echo "| 失败数量 | ${FAIL_COUNT} |"
            echo "| 成功率 | ${SUCCESS_RATE}% |"
            echo ""
            echo "---"
            echo ""
            echo "## 成功代理"
            echo ""
            if [[ "$SUCCESS_COUNT" -gt 0 ]]; then
              echo "| 代理地址 | 端口 | 协议栈 | IPv4 | IPv6 | 响应时间 |"
              echo "|----------|------|--------|------|------|----------|"
              jq -r '
                .[] | select(.success == true) as $r |
                "| \($r.proxyIP) | \($r.portRemote) | \($r.inferred_stack) | \($r.supports_ipv4) | \($r.supports_ipv6) | \($r.responseTime)ms |"
              ' /tmp/response.json
            else
              echo "无"
            fi
            echo ""
            echo "---"
            echo ""
            if [[ "$SUCCESS_COUNT" -gt 0 ]]; then
              echo "## 可用代理列表"
              echo ""
              echo '```'
              cat proxies.txt
              echo '```'
              echo ""
              echo "---"
              echo ""
            fi
            echo "## 失败代理详情"
            echo ""
            if [[ "$FAIL_COUNT" -gt 0 ]]; then
              jq -r '
                .[] | select(.success != true) as $r |
                "### \($r.candidate)",
                "",
                "| 探针 | 状态 | 连接(ms) | TLS(ms) | HTTP(ms) | 状态码 | 错误信息 |",
                "|------|------|----------|---------|----------|--------|----------|",
                (if $r.probe_results.ipv4 then
                  "| IPv4 | \($r.probe_results.ipv4.ok) | \($r.probe_results.ipv4.connect_ms // "-") | \($r.probe_results.ipv4.tls_ms // "-") | \($r.probe_results.ipv4.http_ms // "-") | \($r.probe_results.ipv4.status_code // "-") | \($r.probe_results.ipv4.error // "-") |"
                else
                  "| IPv4 | - | - | - | - | - | 未测试 |"
                end),
                (if $r.probe_results.ipv6 then
                  "| IPv6 | \($r.probe_results.ipv6.ok) | \($r.probe_results.ipv6.connect_ms // "-") | \($r.probe_results.ipv6.tls_ms // "-") | \($r.probe_results.ipv6.http_ms // "-") | \($r.probe_results.ipv6.status_code // "-") | \($r.probe_results.ipv6.error // "-") |"
                else
                  "| IPv6 | - | - | - | - | - | 未测试 |"
                end),
                ""
              ' /tmp/response.json
            else
              echo "无"
            fi
            echo ""
            echo "> 本报告由 GitHub Actions 自动生成，每日 ${TIMESTAMP%% *} 更新。"
          } > report.md

          echo ""
          echo "========================================"
          echo "  检测完成：${TIMESTAMP}"
          echo "  总数: ${TOTAL}  |  成功: ${SUCCESS_COUNT}  |  失败: ${FAIL_COUNT}  |  成功率: ${SUCCESS_RATE}%"
          echo "========================================"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proxies.txt report.md
          git diff --staged --quiet || git commit -m "Daily proxy check update [skip ci]"
          git push